<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { width: 1200px; height: 630px; }

    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background: #FFFFFF;
        color: #212121;
        position: relative;
        overflow: hidden;
    }

    .watermark {
        position: absolute;
        right: -60px;
        top: 50%;
        transform: translateY(-50%);
        width: 480px;
        height: 480px;
        opacity: .10;
    }

    .accent {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 12px;
        background: #1976D2;
    }

    .content {
        position: absolute;
        left: 84px;
        top: 76px;
        right: 84px;
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 38px;
    }

    .logo img { width: 60px; height: 60px; }

    .logo span { font-size: 38px; font-weight: 700; letter-spacing: -1px; }

    h1 {
        font-size: 55px;
        font-weight: 700;
        line-height: 1.12;
        letter-spacing: -1.5px;
        max-width: 880px;
    }

    p.sub {
        margin-top: 26px;
        font-size: 28px;
        color: #5f6368;
        line-height: 1.4;
        max-width: 720px;
    }

    .pills { margin-top: 40px; display: flex; gap: 16px; }

    .pill {
        font-size: 24px;
        font-weight: 700;
        padding: 10px 26px;
        border-radius: 10px;
    }

    .microg { background: #90CAF9; color: #0D47A1; }
    .aosp   { background: #1976D2; color: #FFFFFF; }

</style>
</head>
<body>
    <div class="accent"></div>
    <img class="watermark" src="../icon.png" alt="">

    <div class="content">
        <div class="logo">
            <img src="../icon.png" alt="Sapio">
            <span>Sapio</span>
        </div>
        <h1>Will your apps work without Google Play Services?</h1>
        <p class="sub">Community compatibility for deGoogled Android — microG and bare AOSP.</p>
        <div class="pills">
            <span class="pill microg">microG</span>
            <span class="pill aosp">bareAOSP</span>
        </div>
    </div>
</body>
</html>
